name: AQI Pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-aqi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: python d1.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add air.db aqi_history.csv aqi_latest.csv aqi_state.csv
          git commit -m "Update AQI data" || echo "No changes"
          git push
